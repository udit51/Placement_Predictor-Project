<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Placement Predictor</title>
  <style>
    body { font-family: sans-serif; background: #f8f8f8; text-align: center; padding: 50px; }
    .box { background: #fff; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    input, button { width: 100%; padding: 10px; margin: 10px 0; }
    button { background-color: #007BFF; color: white; border: none; cursor: pointer; }
    button:hover { background-color: #0056b3; }
    #result { font-weight: bold; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Placement Predictor</h2>
    <form id="form">
      <input type="number" step="1" name="IQ" placeholder="Enter IQ" required>
      <input type="number" step="0.1" name="CGPA" placeholder="Enter CGPA" required>
      <button type="submit">Predict</button>
    </form>
    <div id="result"></div>
  </div>

  <script>
    document.getElementById("form").addEventListener("submit", async function (e) {
      e.preventDefault();
      const IQ = parseFloat(document.querySelector('input[name="IQ"]').value);
      const CGPA = parseFloat(document.querySelector('input[name="CGPA"]').value);

      const response = await fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ IQ, CGPA })
      });

      const data = await response.json();
      document.getElementById("result").textContent = data.message;
    });
  </script>
</body>
</html>
